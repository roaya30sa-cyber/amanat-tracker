# wrangler.toml — Cloudflare Pages + D1 configuration
# Run `npx wrangler login` first, then create the D1 DB:
#   npx wrangler d1 create projects-tracker
# Update database_id below with the value returned.

name = "amanat-tracker"
compatibility_date = "2024-10-11"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[d1_databases]]
binding = "DB"
database_name = "projects-tracker"
database_id = "70112d09-67fb-4cad-993b-8dd1a1e9c7e2"

[vars]
NEXTAUTH_URL = "http://localhost:3000"

# Production env vars are set via Cloudflare Pages dashboard:
#   AUTH_SECRET      (generated with `openssl rand -base64 32`)
#   NEXTAUTH_URL     (production domain, e.g. https://amanat.pages.dev)
